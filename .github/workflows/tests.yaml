name: Secure Test Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write 

jobs:
  analyze:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v4.2.2 - Verified stable checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 
      
      - name: Initialize CodeQL
        # v4.35.1 - Latest as of March 27, 2026 (Supports Node.js 24)
        uses: github/codeql-action/init@5c8a8a6886e0883b27b3b0dfb2f11c8d5c80521d 
        with:
          languages: python
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@5c8a8a6886e0883b27b3b0dfb2f11c8d5c80521d 

  test:
    name: Secure Unit Tests
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 

      - name: Set up Python
        # v5.4.0 - Latest Python setup
        uses: actions/setup-python@f677139bbe2bd9ac37be0a3a29bd8b352136975d 
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Execute tests
        env:
          AI_SERVICE_API_KEY: ${{ secrets.GENERIC_API_KEY }}
        run: |
          pytest tests/